name: CellarApp
options:
  bundleIdPrefix: com.cellarkit
  deploymentTarget:
    iOS: "18.0"
packages:
  CellarKitPackage:
    path: ../..
settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  CellarApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: CellarApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cellarkit.ios.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: CellarKit
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: 1,2
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: CellarKitPackage
        product: CellarUI
    preBuildScripts:
      - name: "Compile wine-stub"
        script: |
          set -e
          STUB_SRC="${SRCROOT}/../../Resources/WineRuntime/wine-stub.c"
          BINARIES_DIR="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Binaries"
          STUB_OUT="${BINARIES_DIR}/wine-stub"
          mkdir -p "${BINARIES_DIR}"
          if [ "${PLATFORM_NAME}" = "iphonesimulator" ]; then
            # The simulator is a macOS process: posix_spawn() spawns real macOS
            # children.  Compile wine-stub as a plain macOS ARM64 binary using
            # the host clang so it can be execv'd directly without needing the
            # iOS sim dyld shims.
            /usr/bin/clang \
              -arch arm64 \
              -target arm64-apple-macos14.0 \
              -O2 \
              -o "${STUB_OUT}" "${STUB_SRC}"
          else
            # Device: compile for iOS ARM64.  Needs proper codesigning later.
            xcrun --sdk iphoneos clang \
              -arch arm64 \
              -target arm64-apple-ios18.0 \
              -O2 \
              -o "${STUB_OUT}" "${STUB_SRC}"
          fi
          echo "wine-stub compiled → ${STUB_OUT}"
        inputFiles:
          - ${SRCROOT}/../../Resources/WineRuntime/wine-stub.c
        outputFiles:
          - ${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Binaries/wine-stub
      - name: "Bundle test payloads"
        script: |
          set -e
          PAYLOADS_DIR="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Payloads"
          mkdir -p "${PAYLOADS_DIR}"
          cp -f "${SRCROOT}/../../Resources/TestPayloads/hello-win32.exe" \
            "${PAYLOADS_DIR}/hello-win32.exe"
          echo "Bundled hello-win32.exe → ${PAYLOADS_DIR}/"
        inputFiles:
          - ${SRCROOT}/../../Resources/TestPayloads/hello-win32.exe
        outputFiles:
          - ${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Payloads/hello-win32.exe
  CellarAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: CellarAppUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cellarkit.ios.appUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CellarApp
    dependencies:
      - target: CellarApp
schemes:
  CellarApp:
    build:
      targets:
        CellarApp: all
        CellarAppUITests: [test]
    test:
      gatherCoverageData: false
      targets:
        - name: CellarAppUITests
