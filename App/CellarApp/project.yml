name: CellarApp
options:
  bundleIdPrefix: com.cellarkit
  deploymentTarget:
    iOS: "18.0"
packages:
  CellarKitPackage:
    path: ../..
settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
targets:
  CellarApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: CellarApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cellarkit.ios.app
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: CellarKit
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: 1,2
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: CellarKitPackage
        product: CellarUI
  CellarAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: CellarAppUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cellarkit.ios.appUITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CellarApp
    dependencies:
      - target: CellarApp
schemes:
  CellarApp:
    build:
      targets:
        CellarApp: all
        CellarAppUITests: [test]
    test:
      gatherCoverageData: false
      targets:
        - name: CellarAppUITests
